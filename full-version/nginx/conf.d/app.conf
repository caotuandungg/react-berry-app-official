# Application Server Block — Berry React Admin Dashboard
# Handles: Cache Strategy, SPA Routing, Security, Rate Limiting

# ---------- Rate Limiting Zones ----------
# App routes: 10 req/s per IP (burst 20)
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;
# Static assets: 100 req/s per IP (burst 200) — browsers load many assets in parallel
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide server version (also set in nginx.conf, but defense-in-depth)
    server_tokens off;

    # ---------- Method Restriction ----------
    # SPA only needs GET/HEAD/OPTIONS — block POST, PUT, DELETE, etc.
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    # ---------- Security Headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------- Disable Directory Listing ----------
    autoindex off;

    # 1. HEALTH CHECK ENDPOINT (dedicated, not index.html)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache, no-store";
        return 200 "OK\n";
    }

    # 2. DENY SOURCE MAPS (never serve .map files in production)
    location ~* \.map$ {
        return 404;
    }

    # 3. DENY HIDDEN FILES (.env, .git, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # 4A. HASHED STATIC ASSETS — Cache 1 year, immutable
    #
    # CRA outputs hashed files under /static/:
    #   /static/js/main.3f1a9c.js
    #   /static/css/main.a2b4c6.css
    #   /static/media/logo.d8e4f2.svg
    #
    # Content hash in filename = safe to cache indefinitely.
    # ^~ prefix forces nginx to use this block over any regex match.
    location ^~ /static/ {
        limit_req zone=static_limit burst=200 nodelay;

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # No ETag needed — filename changes when content changes
        etag off;
        if_modified_since off;

        access_log off;
    }

    # 4B. NON-HASHED ASSETS (favicon, manifest, logos in root)
    #     Cache 5 minutes with revalidation via ETag/Last-Modified
    location ~* ^/(favicon\.(ico|svg)|manifest\.json|logo.*\.(png|svg|ico))$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        etag on;
    }

    # 4C. INDEX.HTML — Never cache
    #     Must always fetch latest to pick up new deployments.
    #     ETag enabled for conditional requests (If-None-Match → 304).
    location = /index.html {
        limit_req zone=app_limit burst=20 nodelay;

        # Disable all caching
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # Enable conditional request support (ETag + Last-Modified)
        etag on;
    }

    # 5. STATIC FILE REQUESTS — Files with extensions
    #    Serve if exists, otherwise return 404 (NOT SPA fallback).
    #    This ensures /random.txt → 404, not index.html.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|txt|xml|json|webmanifest|pdf|zip|gz|mp4|webm|ogg|mp3|wav)$ {
        try_files $uri =404;

        # Default short cache for non-hashed files reaching this block
        # (hashed /static/ files are caught by ^~ block above)
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        etag on;

        access_log off;
    }

    # 6. SPA ROUTING — All remaining paths (no file extension)
    #
    # Handles: /admin, /admin/, /admin/settings, /dashboard, etc.
    # React Router takes over client-side routing from index.html.
    #
    # Key behavior:
    #   /admin          → try_files → not a file → serve index.html ✓
    #   /admin/         → try_files → not a dir  → serve index.html ✓
    #   /admin/settings → try_files → not a file → serve index.html ✓
    #   /random.txt     → caught by extension block above → 404 ✓
    location / {
        limit_req zone=app_limit burst=20 nodelay;

        # Try exact file, then directory, then SPA fallback
        try_files $uri $uri/ /index.html;
    }
}
