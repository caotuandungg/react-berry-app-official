limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    autoindex off;

    # [ Modifier = ] Khớp chính xác hoàn toàn (Exact match) với đường dẫn /health.
    # Nhanh nhất. Nginx sẽ dừng tìm kiếm ngay khi thấy khớp.
    location = /health {
        access_log off; # Tắt ghi log để tránh rác log
        add_header Content-Type text/plain; # Trả về định dạng văn bản thuần
        add_header Cache-Control "no-cache, no-store"; # Không lưu cache
        return 200 "OK\n"; # Trả về mã 200 và chữ "OK"
    }

    # [ Modifier ~* ] Khớp Biểu thức chính quy (Regex) KHÔNG phân biệt chữ hoa/thường (Case-insensitive).
    # Dấu \. là để thoát (escape) dấu chấm, nghĩa là file kết thúc bằng đúng chữ ".map" (Map hay mAp đều bị chặn).
    location ~* \.map$ {
        return 404;
    }

    # [ Modifier ~ ] Khớp Biểu thức chính quy (Regex) CÓ phân biệt chữ hoa/thường (Case-sensitive).
    # Dấu \. chặn các file/thư mục bắt đầu bằng dấu chấm (như .env, .git).
    location ~ /\. {
        deny all; # Từ chối quyền truy cập
        return 404; # Trả về lỗi không tìm thấy
    }

    # [ Modifier ^~ ] Khớp tiền tố (Prefix match) độ ưu tiên cao.
    # Nếu đường dẫn bắt đầu bằng /static/, Nginx sẽ chọn block này NGAY LẬP TỨC mà BỎ QUA kiểm tra Regex ở dưới.
    location ^~ /static/ {
        limit_req zone=static_limit burst=200 nodelay; # Giới hạn số lượng request để chống DDoS

        expires 1y; # Báo trình duyệt lưu cache file trong tận 1 năm
        add_header Cache-Control "public, max-age=31536000, immutable"; # Header báo lưu file tĩnh lâu dài
        add_header X-Content-Type-Options "nosniff" always; # Ngăn trình duyệt tự đoán sai kiểu file

        etag off; # Tắt ETag vì đã dùng expires với thời gian cực dài ở trên
        if_modified_since off; # Tắt cơ chế kiểm tra file có sửa không

        access_log off; # Không ghi log các file tĩnh này cho nhẹ server
    }

    # [ Modifier ~* ] Regex KHÔNG phân biệt hoa/thường.
    # Khớp các file có tên cụ thể: favicon.(ico|svg), manifest.json, hoặc file bắt đầu bằng logo...
    location ~* ^/(favicon\.(ico|svg)|manifest\.json|logo.*\.(png|svg|ico))$ {
        expires 5m; # Chỉ cho lưu cache 5 phút
        add_header Cache-Control "public, max-age=300, must-revalidate"; # Bắt buộc trình duyệt gọi lại check sau 5p
        add_header X-Content-Type-Options "nosniff" always;
        etag on; # Bật ETag để xem file có bị thay đổi ở phía server không
    }

    # [ Modifier = ] Khớp CHÍNH XÁC file /index.html.
    location = /index.html {
        limit_req zone=app_limit burst=20 nodelay; # Giới hạn request gọi vào root index

        expires -1; # Không lưu cache đối với file này
        add_header Cache-Control "no-cache, no-store, must-revalidate" always; # Bắt buộc phải tải index HTML mới nhất
        # Đã bị xóa: add_header Pragma "no-cache" always; (Lỗi thời)

        # Đã bị xóa: etag on; (Mặc định Nginx đã bật)
    }

    # [ Modifier ~* ] Regex KHÔNG phân biệt hoa/thường. Bắt đuôi các file tĩnh (js, css, png...).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|txt|xml|json|webmanifest|pdf|zip|gz|mp4|webm|ogg|mp3|wav)$ {
        try_files $uri =404; # Thử tìm các file thực tế đó trên đĩa, nếu không thấy thì báo lỗi 404

        expires 5m; # Các loại file này được lưu cache 5 phút
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        # Đã bị xóa: etag on;

        access_log off; # Tắt ghi log
    }

    # [ Không có Modifier (Mặc định) ] Khớp tiền tố (Prefix match) ưu tiên thấp nhất.
    # / nghĩa là bắt mọi đường dẫn. Nginx sẽ chạy vào block này nếu KHÔNG khớp với bất kỳ block nào ở trên.
        limit_req zone=app_limit burst=20 nodelay; # Hạn chế request tới Router để chống quá tải

        try_files $uri $uri/ /index.html; # Ý nghĩa quan trọng: Nếu không tìm thấy file thực ở server, hãy ném cho /index.html để React Router xử lý
    }
}
