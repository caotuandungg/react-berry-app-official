limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    autoindex off;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache, no-store";
        return 200 "OK\n";
    }

    location ~* \.map$ {
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    
    location ^~ /static/ {
        limit_req zone=static_limit burst=200 nodelay;

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        etag off;
        if_modified_since off;

        access_log off;
    }

    
    location ~* ^/(favicon\.(ico|svg)|manifest\.json|logo.*\.(png|svg|ico))$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        etag on;
    }

    
    location = /index.html {
        limit_req zone=app_limit burst=20 nodelay;

        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;

        etag on;
    }

    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|txt|xml|json|webmanifest|pdf|zip|gz|mp4|webm|ogg|mp3|wav)$ {
        try_files $uri =404;

        
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        etag on;

        access_log off;
    }

    
    location / {
        limit_req zone=app_limit burst=20 nodelay;

        try_files $uri $uri/ /index.html;
    }
}
