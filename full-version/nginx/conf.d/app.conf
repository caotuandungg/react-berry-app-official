limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    autoindex off;

    # [ Modifier = ] Khớp chính xác hoàn toàn (Exact match) với đường dẫn /health.
    # Nhanh nhất. Nginx sẽ dừng tìm kiếm ngay khi thấy khớp.
    location = /health {
        # access_log off: Tắt ghi log.
        # Tại sao cần: Đường dẫn này dùng để server tự động "gõ cửa" kiểm tra web định kỳ (vd: mỗi 10s) xem web còn sống ko.
        # Tác hại nếu ko có: File log bị phình to khủng khiếp chứa rác "/health".
        access_log off; 
        
        # return 200 "OK\n": Trả về chữ "OK" và mã thành công.
        add_header Content-Type text/plain; 
        add_header Cache-Control "no-cache, no-store"; 
        return 200 "OK\n"; 
    }

    # [ Modifier ~* ] Khớp Biểu thức chính quy (Regex) KHÔNG phân biệt chữ hoa/thường (Case-insensitive).
    # Dấu \. là để thoát (escape) dấu chấm, nghĩa là file kết thúc bằng đúng chữ ".map" (Map hay mAp đều bị chặn).
    location ~* \.map$ {
        # return 404: 
        # Tại sao cần: ".map" là file bản đồ mã nguồn (Source Maps) của React. Nó giúp hiển thị rõ code gốc đã viết (gồm comment, cấu trúc thư mục) cho dễ Debug.
        # Tác hại nếu ko có (cho truy cập): Người lạ/hacker có thể mở F12 và lấy được sạch 100% mã nguồn Frontend bí mật của bạn (y chang lúc bạn code trên VS Code).
        return 404;
    }

    # [ Modifier ~ ] Khớp Biểu thức chính quy (Regex) CÓ phân biệt chữ hoa/thường (Case-sensitive).
    # Dấu \. chặn các file/thư mục bắt đầu bằng dấu chấm (như .env, .git).
    location ~ /\. {
        # deny all: Cấm 100% mọi request.
        # Tại sao cần: Lập trình viên hay chép nhầm các file chứa pass/cấu hình mật như `.env`, hoặc thư mục mã nguồn `.git` lên server.
        # Tác hại nếu ko có: Lộ mật khẩu Database, lộ Secret Key của JWT, lộ mã Nguồn, v.v... Web coi như "bỏ cmn đi".
        deny all; 
        return 404; 
    }

    # [ Modifier ^~ ] Khớp tiền tố (Prefix match) độ ưu tiên cao.
    # Nếu đường dẫn bắt đầu bằng /static/, Nginx sẽ chọn block này NGAY LẬP TỨC mà BỎ QUA kiểm tra Regex ở dưới.
    location ^~ /static/ {
        # limit_req zone=static_limit burst=200 nodelay:
        # Tại sao cần: Phân bổ và chống tải quá nhiều luồng xin file tĩnh cùng lúc từ 1 IP.
        # Tác hại nếu ko có: Bot / Người xấu dùng tool spam xin 100.000 file ảnh cùng lúc dẫn đến sập server Nginx vì đuối sức trả lời.
        limit_req zone=static_limit burst=200 nodelay; 

        # expires 1y:
        # Tại sao cần: File js/css build của React đã có sẵn hash (mã băm) ở tên file, nên nội dung của nó KHÔNG bao giờ đổi. Cấu hình gửi báo cho User lưu cache 1 năm.
        # Tác hại nếu ko có: Mỗi lần User bấm nút/chuyển trang, trình duyệt phải tải lại nguyên 5-10MB file JS/CSS => Giật, Nặng băng thông, tốn tiền 4G của user.
        expires 1y; 
        
        # Ý NGHĨA CỦA CÁC TỪ KHÓA TRONG CACHE-CONTROL:
        # * public: Ai cũng được phép lưu cache file này (trình duyệt của user, các server trung gian như CDN, Proxy).
        # * max-age=31536000: Thời gian sống của cache tính bằng giây (31.536.000 giây = đúng 1 năm). 
        # * immutable: File này là "bất biến". Trình duyệt CỨ YÊN TÂM dùng bản lưu ở ổ cứng đi, KHÔNG CẦN gọi lên server hỏi thêm "file có bị thay đổi chưa?" trong suốt 1 năm đó.
        add_header Cache-Control "public, max-age=31536000, immutable"; 
        
        # X-Content-Type-Options: 
        # Tại sao cần: Ngăn Hacker lừa trình duyệt tải trang HTML độc hại (đội lốt file ảnh/js) lên web của bạn.
        add_header X-Content-Type-Options "nosniff" always; 

        # etag off / if_modified_since off: 
        # Tại sao cần: Đã bảo là lưu cache tĩnh (immutable) bằng Expires rồi, thì tắt mịa nó 2 tính năng kiểm-tra-file-thay-đổi (ETag, ModifiedSince) của Nginx đi cho đỡ nặng server ngầm.
        # Tác hại nếu ko có: Lãng phí CPU và bộ nhớ đệm vì Server Nginx lúc nào cũng phải tạo thêm thẻ ETag vô ích.
        etag off; 
        if_modified_since off; 

        # access_log off: 
        # Tại sao cần: Các file tải ngầm (js, css) một phút có 1 triệu request thì log sẽ "bự tổ chảng", mà thông tin log tải js chả quan trọng gì để đọc.
        access_log off; 
    }

    # [ Modifier ~* ] Regex KHÔNG phân biệt hoa/thường.
    # Khớp các file có tên cụ thể: favicon.(ico|svg), manifest.json, hoặc file bắt đầu bằng logo...
    location ~* ^/(favicon\.(ico|svg)|manifest\.json|logo.*\.(png|svg|ico))$ {
        # expires 5m / Cache-Control:
        # Tại sao cần: Mấy cái Logo hiển thị hay Manifest của PWA lâu lâu mới bị thay đổi một lần (vd cty đổi logo lễ tết). Cho lưu cache sống 5 phút là vừa đẹp. Sau 5 phút thì User bắt buộc phải gọi server check (must-revalidate).
        expires 5m; 
        add_header Cache-Control "public, max-age=300, must-revalidate"; 
        add_header X-Content-Type-Options "nosniff" always;
        
        # etag on:
        # Tại sao cần: Phải bật vì server rảnh thì lấy mã băm file Logo này gửi về. Để nếu 5 phút sau User hỏi "có Logo mới đổi chưa?", Server biết nếu ETag y cũ thì báo "file logo đó cũ xì rồi chả ai sửa đâu, cứ xài tiếp đi em" ("304 Not Modified"), khỏi tốn công gửi nặng cái ảnh mới 2MB cục bộ cho tốn Data mạng 4G.
        etag on; 
    }

    # [ Modifier = ] Khớp CHÍNH XÁC file /index.html.
    location = /index.html {
        limit_req zone=app_limit burst=20 nodelay; 

        # expires -1 / Cache-Control no-cache, no-store, must-revalidate:
        # Tại sao Cực Kì Quan Trọng: File index.html chứa link trỏ đến tên file file JS/CSS. Cấm TUYỆT ĐỐI trình duyệt lưu đệm cái index.html này.
        # Tác hại cực lớn nếu ko có: Nếu index.html bị trình duyệt lưu chết trong Cache, thì khi bạn Đẩy bản cập nhật Website mới... Trình duyệt của user vẫn tự đọc CÁI FILE INDEX.HTML CŨ rỉn trong ổ cứng -> Nó sẽ bốc tên file js cũ (vd abc.js) ra để bắt server Nginx tải. NHƯNG Nginx đã trỏ đến file efg.js mới nhất cơ => WEB XUẤT HIỆN MÀN HÌNH TRẮNG TOÁT hoạc lỗi 404 Nát bét chìm trong bể máu User Report.
        expires -1; 
        add_header Cache-Control "no-cache, no-store, must-revalidate" always; 
    }

    # [ Modifier ~* ] Regex KHÔNG phân biệt hoa/thường. Bắt đuôi các file tĩnh (js, css, png...).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|txt|xml|json|webmanifest|pdf|zip|gz|mp4|webm|ogg|mp3|wav)$ {
        # try_files $uri =404: 
        # Tại sao cần: Để chống tải lậu. Nếu user mở file /images/nonexistent.png mà ko có file đó thật trên đĩa, Nginx phang cmn lỗi 404 cho gọn, ko được đẩy tiếp xuống cho React Router mất thì giờ xử lý.
        try_files $uri =404; 

        expires 5m; 
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;

        access_log off; 
    }

    # [ Không có Modifier (Mặc định) ] Khớp tiền tố (Prefix match) ưu tiên thấp nhất.
    # / nghĩa là bắt mọi đường dẫn. Nginx sẽ chạy vào block này nếu KHÔNG khớp với bất kỳ block nào ở trên.
        limit_req zone=app_limit burst=20 nodelay; # Hạn chế request tới Router để chống quá tải

        try_files $uri $uri/ /index.html; # Ý nghĩa quan trọng: Nếu không tìm thấy file thực ở server, hãy ném cho /index.html để React Router xử lý
    }
}
