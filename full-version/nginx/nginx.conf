# Main Nginx Configuration — Production Optimized
# Running as non-root (no 'user' directive needed, nginx user set in Dockerfile)

# Auto-detect CPU cores for optimal worker count
worker_processes auto;

# Increase file descriptor limit for high-concurrency
worker_rlimit_nofile 8192;

# PID file in writable location for non-root user
pid /var/run/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    # Connections per worker (tune based on expected traffic)
    worker_connections 1024;

    # Accept multiple connections at once
    multi_accept on;
}

http {
    # ---------- MIME Types ----------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------- Security ----------
    # Hide nginx version from response headers and error pages
    server_tokens off;

    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ---------- Performance ----------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 100;

    # Client body size limit (SPA doesn't accept uploads via nginx)
    client_max_body_size 1m;

    # Temp paths for non-root operation
    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path       /tmp/nginx/proxy_temp;
    fastcgi_temp_path     /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path       /tmp/nginx/uwsgi_temp;
    scgi_temp_path        /tmp/nginx/scgi_temp;

    # ---------- Open File Cache (reduces syscalls for static files) ----------
    open_file_cache          max=1000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ---------- Gzip Compression ----------
    gzip on;
    gzip_vary on;
    # Only compress responses > 1KB (smaller responses have negligible gain)
    gzip_min_length 1024;
    # Level 6: good compression/CPU balance
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    # Compress only appropriate MIME types
    # EXCLUDED: image/png, image/jpeg, image/gif, image/webp (already compressed)
    # EXCLUDED: application/zip, application/gzip (already compressed)
    # EXCLUDED: font/woff, font/woff2 (already compressed)
    gzip_types
        text/plain
        text/css
        text/xml
        text/html
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Disable gzip for old IE versions (known bugs)
    gzip_disable "msie6";

    # Serve pre-compressed .gz files directly (bypasses runtime gzip module)
    # "always" = send .gz even if client omits Accept-Encoding (safe for modern browsers)
    gzip_static always;

    # ---------- Rate Limiting — Return 429 (not default 503) ----------
    # 429 Too Many Requests is the correct HTTP status for rate limiting
    # 503 Service Unavailable implies server problem, not client throttling
    limit_req_status 429;
    limit_conn_status 429;

    # ---------- ETag Support (Conditional Requests) ----------
    # Enabled by default — explicit for documentation
    # Enables If-None-Match / 304 Not Modified responses
    etag on;

    # ---------- Include Server Blocks ----------
    include /etc/nginx/conf.d/*.conf;
}
