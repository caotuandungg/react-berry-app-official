worker_processes auto;
worker_rlimit_nofile 65535; # mở giới hạn file để chịu tải lớn

pid /var/run/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 8192; # tăng số lượng kết nối tối đa mỗi luồng

    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 100;

    client_max_body_size 0;     # đổi từ 1m thành 0 để bỏ giới hạn dung lượng upload toàn cục

    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path       /tmp/nginx/proxy_temp;
    fastcgi_temp_path     /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path       /tmp/nginx/uwsgi_temp;
    scgi_temp_path        /tmp/nginx/scgi_temp;

    open_file_cache          max=1000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    
    gzip_types
        text/plain
        text/css
        text/xml
        text/html
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    gzip_disable "msie6";

    
    gzip_static always;

    
    limit_req_status 429;
    limit_conn_status 429;

    
    etag on;

    include /etc/nginx/conf.d/*.conf;
}
